<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#6366f1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Workout Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0f; --card: #111122; --border: #1a1a2e;
  --text: #e5e5e5; --muted: #6b7280; --dim: #4b5563;
  --accent: #6366f1; --accent2: #a78bfa; --blue: #3b82f6;
  --pink: #ec4899; --purple: #8b5cf6;
  --input-bg: #0a0a1a; --input-border: #2a2a4a;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
html, body { background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, sans-serif; min-height: 100vh; -webkit-tap-highlight-color: transparent; overscroll-behavior: none; }
body { padding-bottom: calc(80px + var(--safe-bottom)); max-width: 480px; margin: 0 auto; }
input[type=number] { -moz-appearance: textfield; }
input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

/* Header */
.header { padding: 16px 16px 12px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: #0a0a0fee; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: 50; }
.header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.logo { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.person-toggle { display: flex; background: var(--card); border-radius: 10px; padding: 3px; gap: 2px; }
.person-btn { padding: 6px 16px; font-size: 13px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; transition: all .2s; background: transparent; color: var(--muted); }
.person-btn.him-active { background: linear-gradient(135deg, var(--blue), var(--accent)); color: #fff; }
.person-btn.her-active { background: linear-gradient(135deg, var(--pink), #a855f7); color: #fff; }
.day-tabs { display: flex; gap: 4px; }
.day-btn { flex: 1; padding: 8px 0; font-size: 12px; font-weight: 500; border: none; border-radius: 8px; cursor: pointer; transition: all .2s; background: transparent; color: var(--dim); }
.day-btn.active { background: #1e1e3a; color: var(--accent2); font-weight: 700; }

/* Content */
.day-title { padding: 14px 16px 4px; }
.day-title h2 { font-size: 16px; font-weight: 700; color: #c4b5fd; }
.day-title .focus { font-size: 12px; color: var(--muted); margin-top: 4px; }
.warmup { padding: 8px 16px; }
.warmup-card { background: var(--card); border-radius: 12px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; }
.warmup-card .icon { font-size: 18px; }
.warmup-card .label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.warmup-card .desc { font-size: 13px; color: #9ca3af; margin-top: 2px; }

/* Section */
.section { padding: 8px 16px; }
.section-label { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; padding-left: 2px; }
.section-label.pink { color: var(--pink); }

/* Exercise card */
.ex-card { background: var(--card); border-radius: 14px; margin-bottom: 8px; overflow: hidden; border: 1px solid var(--border); }
.ex-header { width: 100%; padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; background: none; border: none; cursor: pointer; text-align: left; -webkit-tap-highlight-color: transparent; }
.ex-name { font-size: 14px; font-weight: 600; color: var(--text); }
.ex-meta { font-size: 12px; color: var(--muted); margin-top: 2px; display: flex; gap: 8px; flex-wrap: wrap; }
.ex-notes { font-size: 11px; color: var(--purple); margin-top: 3px; }
.ex-chevron { font-size: 16px; color: var(--dim); transition: transform .2s; flex-shrink: 0; }
.ex-chevron.open { transform: rotate(180deg); }
.ex-body { padding: 0 14px 14px; }
.set-headers { display: flex; gap: 8px; margin-bottom: 6px; padding-left: 34px; }
.set-headers span { font-size: 10px; color: var(--dim); font-weight: 600; text-transform: uppercase; }
.set-headers .h-prev { flex: 1; }
.set-headers .h-kg { width: 72px; text-align: center; }
.set-headers .h-reps { width: 56px; text-align: center; }
.set-headers .h-rest { width: 36px; }
.set-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.set-num { width: 26px; height: 26px; border-radius: 8px; background: #1a1a2e; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--accent); flex-shrink: 0; }
.set-prev { flex: 1; font-size: 11px; color: var(--dim); font-family: 'JetBrains Mono', monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.set-input { padding: 6px 8px; font-size: 14px; font-family: 'JetBrains Mono', monospace; font-weight: 600; background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 8px; color: var(--text); text-align: center; outline: none; transition: border-color .15s; }
.set-input:focus { border-color: var(--accent); }
.set-input.kg { width: 72px; }
.set-input.reps { width: 56px; }
.rest-btn { width: 36px; height: 32px; border-radius: 8px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--muted); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

/* Cardio */
.cardio-card { background: linear-gradient(135deg, #1a0a2e, #0f172a); border-radius: 14px; padding: 14px; border: 1px solid #2d1a4e; }
.cardio-card .name { font-size: 14px; font-weight: 600; color: #e879a0; }
.cardio-card .dur { font-size: 13px; color: #9ca3af; margin-top: 4px; }
.cardio-card .info { font-size: 12px; color: var(--muted); margin-top: 4px; }

/* J4 toggle */
.j4-toggle { padding: 4px 16px 8px; display: flex; gap: 6px; }
.j4-btn { flex: 1; padding: 8px 0; font-size: 12px; font-weight: 600; border-radius: 8px; cursor: pointer; background: transparent; color: var(--muted); border: 1px solid var(--border); transition: all .2s; }
.j4-btn.active { border-color: #a855f7; background: #1a0a2e; color: #c084fc; }

/* Save */
.save-area { padding: 16px; }
.save-btn { width: 100%; padding: 14px 0; font-size: 15px; font-weight: 700; border: none; border-radius: 12px; cursor: pointer; background: linear-gradient(135deg, var(--blue), var(--purple)); color: #fff; letter-spacing: 0.5px; box-shadow: 0 4px 20px #3b82f644; }
.save-btn:disabled { opacity: .6; cursor: wait; }

/* Timer */
.timer-float { position: fixed; bottom: calc(20px + var(--safe-bottom)); left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #1e3a5f, #1e1e3a); border-radius: 16px; padding: 10px 24px; z-index: 100; display: flex; align-items: center; gap: 12px; box-shadow: 0 8px 32px #0008; border: 1px solid #ffffff15; }
.timer-float.urgent { background: linear-gradient(135deg, #dc2626, #b91c1c); }
.timer-time { font-size: 22px; font-family: 'JetBrains Mono', monospace; font-weight: 700; color: #60a5fa; }
.timer-float.urgent .timer-time { color: #fca5a5; }
.timer-close { background: #ffffff15; border: none; color: #9ca3af; border-radius: 8px; padding: 4px 10px; font-size: 11px; cursor: pointer; font-weight: 600; }

/* Reset */
.reset { padding: 20px 16px; text-align: center; }
.reset-btn { background: none; border: none; color: var(--dim); font-size: 11px; cursor: pointer; text-decoration: underline; }

/* Checked set indicator */
.set-done { background: #1a2e1a !important; border-color: #2d4e2d !important; }
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <span class="logo">TRACKER</span>
    <div class="person-toggle">
      <button class="person-btn him-active" id="btn-him" onclick="setPerson('him')">Moi</button>
      <button class="person-btn" id="btn-her" onclick="setPerson('her')">Elle</button>
    </div>
  </div>
  <div class="day-tabs" id="day-tabs"></div>
</div>

<div id="content"></div>

<div class="timer-float" id="timer" style="display:none">
  <span class="timer-time" id="timer-time">0:00</span>
  <button class="timer-close" onclick="stopTimer()">✕</button>
</div>

<script>
// ======================== DATA ========================
const PROGRAM = {
  J1: {

    common: [

      { name: "Low-to-high cable fly", sets: 3, reps: "10–15", rir: "0–1", rest: "45–60s", restSec: 50, notes: "" },

    herFocus: "Entretien haut du corps + cardio",
  },
  J2: {
    label: "J2 — LOWER A",
    warmup: "Vélo doux ou tapis plat — 5 min",
    common: [
      { name: "Leg curl assis/allongé", sets: 3, reps: "10–15", rir: "1–2", rest: "60–75s", restSec: 65, notes: "" },
      { name: "Hip thrust machine/Smith", sets: 3, reps: "8–12", rir: "1–2", rest: "75–90s", restSec: 80, notes: "Priorité fessiers" },
      { name: "Presse à cuisses", sets: 2, reps: "10–15", rir: "1–2", rest: "75–90s", restSec: 80, notes: "Elle : amplitude sans douleur" },
      { name: "Abduction machine", sets: 2, reps: "12–20", rir: "0–2", rest: "45–60s", restSec: 50, notes: "" },
    ],
    her: { label: "Marche inclinée", duration: "15–20 min", notes: "Modérée à soutenue" },
    him: [
      { name: "Romanian deadlift barre/Smith", sets: 3, reps: "6–10", rir: "1–2", rest: "90–120s", restSec: 100, notes: "" },
      { name: "Mollets debout ou presse", sets: 4, reps: "8–12", rir: "0–1", rest: "45–60s", restSec: 50, notes: "" },
    ],
    himFocus: "Ischios, fessiers, mollets",
    herFocus: "Bas du corps genou-compatible + cardio",
  },
  J3: {
    label: "J3 — UPPER B",
    warmup: "Rameur léger — 5 min",
    common: [
      { name: "Seated cable row modéré", sets: 3, reps: "8–12", rir: "1–2", rest: "75–90s", restSec: 80, notes: "Elle : modéré" },
      { name: "Reverse pec deck", sets: 3, reps: "12–20", rir: "0–2", rest: "45–60s", restSec: 50, notes: "Posture / arrière épaule" },
      { name: "Développé convergent machine", sets: 2, reps: "8–12", rir: "1–2", rest: "75–90s", restSec: 80, notes: "Sans forcer" },
      { name: "Curl poulie", sets: 2, reps: "10–15", rir: "0–2", rest: "45–60s", restSec: 50, notes: "" },
    ],
    her: { label: "Marche inclinée", duration: "15–20 min", notes: "Modérée" },
    him: [
      { name: "Tirage vertical uni poulie", sets: 3, reps: "10–14", rir: "0–1", rest: "60–75s", restSec: 65, notes: "" },
      { name: "Bayesian curl", sets: 2, reps: "10–15", rir: "0–1", rest: "45–60s", restSec: 50, notes: "" },
      { name: "Reverse curl EZ/poulie", sets: 1, reps: "12–15", rir: "0–1", rest: "45–60s", restSec: 50, notes: "" },
      { name: "Élévations latérales poulie", sets: 2, reps: "12–20", rir: "0–1", rest: "45–60s", restSec: 50, notes: "" },
    ],
    himFocus: "Dos, biceps, deltoïde latéral/postérieur",
    herFocus: "Dos entretien, posture, cardio",
  },
  J4: {
    label: "J4 — LOWER B / FLEXIBLE",
    warmup: "Vélo doux ou tapis — 5 min",
    common: [],
    her: { label: "Marche inclinée progressive", duration: "30–40 min", notes: "Inclinaison 5–10 %, vitesse 4.8–5.8 km/h + mobilité 5–10 min" },
    herAlt: [
      { name: "Leg curl", sets: 2, reps: "12–15", rir: "1–2", rest: "60s", restSec: 60, notes: "" },
      { name: "Hip thrust", sets: 2, reps: "10–12", rir: "1–2", rest: "75–90s", restSec: 80, notes: "" },
      { name: "Cable glute kickback", sets: 2, reps: "12–15", rir: "0–2", rest: "45–60s", restSec: 50, notes: "" },
      { name: "Mollets debout", sets: 2, reps: "12–20", rir: "0–2", rest: "45–60s", restSec: 50, notes: "" },
    ],
    him: [
      { name: "Leg extension", sets: 3, reps: "10–15", rir: "0–1", rest: "45–60s", restSec: 50, notes: "" },
      { name: "Hack squat ou presse", sets: 3, reps: "8–12", rir: "1–2", rest: "90–120s", restSec: 100, notes: "" },
      { name: "Leg curl", sets: 3, reps: "10–15", rir: "0–1", rest: "60–75s", restSec: 65, notes: "" },
      { name: "Mollets assis", sets: 4, reps: "12–20", rir: "0–1", rest: "45–60s", restSec: 50, notes: "" },
      { name: "Crunch câble", sets: 3, reps: "10–15", rir: "0–1", rest: "45–60s", restSec: 50, notes: "" },
    ],
    himFocus: "Quadriceps, ischios, mollets, abdos",
    herFocus: "Full cardio ou lower light + cardio",
  },
  J5: {
    label: "J5 — UPPER C",
    warmup: "Rameur léger ou tapis — 5 min",
    common: [
      { name: "Développé incliné machine/Smith", sets: 2, reps: "8–12", rir: "1–2", rest: "75–90s", restSec: 80, notes: "" },
      { name: "Lat pulldown léger/modéré", sets: 2, reps: "10–12", rir: "1–2", rest: "75s", restSec: 75, notes: "Elle : léger" },
      { name: "Élévations latérales", sets: 3, reps: "12–20", rir: "0–2", rest: "45–60s", restSec: 50, notes: "" },
      { name: "Face pull / reverse pec deck", sets: 2, reps: "12–20", rir: "0–2", rest: "45–60s", restSec: 50, notes: "" },
      { name: "Curl marteau corde", sets: 2, reps: "10–15", rir: "0–2", rest: "45–60s", restSec: 50, notes: "" },
    ],
    her: { label: "Marche inclinée", duration: "15–20 min", notes: "Modérée à soutenue" },
    him: [
      { name: "Écarté poulie position étirée", sets: 3, reps: "10–15", rir: "0–1", rest: "45–60s", restSec: 50, notes: "" },
      { name: "Tirage dorsal coude vers hanche", sets: 3, reps: "8–12", rir: "0–1", rest: "60–75s", restSec: 65, notes: "" },
      { name: "Curl incliné poulie", sets: 2, reps: "10–15", rir: "0–1", rest: "45–60s", restSec: 50, notes: "" },
      { name: "Extension triceps overhead corde", sets: 3, reps: "10–15", rir: "0–1", rest: "45–60s", restSec: 50, notes: "" },
    ],
    himFocus: "Haut de pec, lats, biceps, triceps",
    herFocus: "Entretien haut du corps + cardio",
  },
};

const DAYS = ["J1","J2","J3","J4","J5"];

// ======================== STATE ========================
let state = {
  day: "J1",
  person: "him",
  j4HerMode: "cardio",
  expanded: {},
  current: {},  // current session inputs {key: {kg, reps}}
};

let history = {};  // {key: {kg, reps, date}}
let timerInterval = null;
let timerLeft = 0;

// ======================== STORAGE ========================
const STORAGE_KEY = "workout_tracker_data_v2";

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      history = d.history || {};
    }
  } catch(e) {}
}

function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ history }));
  } catch(e) {
    alert("Erreur de sauvegarde !");
  }
}

// ======================== KEYS ========================
function genKey(person, day, section, exIdx, setIdx) {
  return `${person}:${day}:${section}:${exIdx}:${setIdx}`;
}

function dateLabel(d) {
  if (!d) return "";
  const dt = new Date(d);
  return `${String(dt.getDate()).padStart(2,"0")}/${String(dt.getMonth()+1).padStart(2,"0")}`;
}

// ======================== TIMER ========================
function startRest(seconds) {
  stopTimer();
  timerLeft = seconds;
  const el = document.getElementById("timer");
  el.style.display = "flex";
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timerLeft--;
    if (timerLeft <= 0) {
      stopTimer();
      // vibrate if supported
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      return;
    }
    updateTimerDisplay();
  }, 1000);
}

function updateTimerDisplay() {
  const el = document.getElementById("timer");
  const tt = document.getElementById("timer-time");
  tt.textContent = `${Math.floor(timerLeft/60)}:${String(timerLeft%60).padStart(2,"0")}`;
  el.className = timerLeft <= 5 ? "timer-float urgent" : "timer-float";
}

function stopTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  document.getElementById("timer").style.display = "none";
}

// ======================== ACTIONS ========================
function setPerson(p) {
  state.person = p;
  state.expanded = {};
  render();
}

function setDay(d) {
  state.day = d;
  state.expanded = {};
  render();
}

function toggleEx(id) {
  state.expanded[id] = !state.expanded[id];
  render();
}

function setJ4Mode(m) {
  state.j4HerMode = m;
  render();
}

function onInput(key, field, value) {
  if (!state.current[key]) state.current[key] = {};
  state.current[key][field] = value;
  // Don't re-render on every keystroke, just update locally
}

function saveSession() {
  const now = new Date().toISOString();
  let count = 0;
  // Collect from DOM inputs
  document.querySelectorAll("[data-key]").forEach(input => {
    const key = input.dataset.key;
    const field = input.dataset.field;
    const val = input.value.trim();
    if (val) {
      if (!state.current[key]) state.current[key] = {};
      state.current[key][field] = val;
    }
  });
  Object.entries(state.current).forEach(([key, val]) => {
    if (val.kg || val.reps) {
      history[key] = { kg: val.kg || "", reps: val.reps || "", date: now };
      count++;
    }
  });
  if (count === 0) return;
  saveData();
  state.current = {};
  render();
}

function clearAll() {
  if (!confirm("Effacer TOUT l'historique de charges ?")) return;
  history = {};
  state.current = {};
  localStorage.removeItem(STORAGE_KEY);
  render();
}

// ======================== RENDER ========================
function render() {
  const day = PROGRAM[state.day];
  const p = state.person;

  // Person buttons
  document.getElementById("btn-him").className = `person-btn ${p === "him" ? "him-active" : ""}`;
  document.getElementById("btn-her").className = `person-btn ${p === "her" ? "her-active" : ""}`;

  // Day tabs
  const tabs = document.getElementById("day-tabs");
  tabs.innerHTML = DAYS.map(d =>
    `<button class="day-btn ${state.day === d ? "active" : ""}" onclick="setDay('${d}')">${d}</button>`
  ).join("");

  // Build content
  let html = "";

  // Day title
  html += `<div class="day-title"><h2>${day.label}</h2><div class="focus">${p === "him" ? day.himFocus : day.herFocus}</div></div>`;

  // Warmup
  html += `<div class="warmup"><div class="warmup-card"><span class="icon">🔥</span><div><div class="label">Échauffement</div><div class="desc">${day.warmup}</div></div></div></div>`;

  // J4 her toggle
  if (state.day === "J4" && p === "her" && day.herAlt) {
    html += `<div class="j4-toggle">
      <button class="j4-btn ${state.j4HerMode === "cardio" ? "active" : ""}" onclick="setJ4Mode('cardio')">Full Cardio</button>
      <button class="j4-btn ${state.j4HerMode === "light" ? "active" : ""}" onclick="setJ4Mode('light')">Lower Light + Cardio</button>
    </div>`;
  }

  // Sections
  const sections = [];
  if (day.common.length > 0) {
    sections.push({ id: "common", label: "Bloc commun", exercises: day.common });
  }
  if (p === "him") {
    sections.push({ id: "him", label: "Spécialisation", exercises: day.him });
  }
  if (p === "her" && state.day === "J4" && state.j4HerMode === "light" && day.herAlt) {
    sections.push({ id: "herAlt", label: "Option Lower Light", exercises: day.herAlt });
  }

  let hasInputs = false;

  sections.forEach(sec => {
    html += `<div class="section"><div class="section-label">${sec.label}</div>`;
    sec.exercises.forEach((ex, exIdx) => {
      const eid = `${sec.id}-${exIdx}`;
      const open = state.expanded[eid];
      html += `<div class="ex-card">
        <button class="ex-header" onclick="toggleEx('${eid}')">
          <div>
            <div class="ex-name">${ex.name}</div>
            <div class="ex-meta"><span>${ex.sets}×${ex.reps}</span><span>RIR ${ex.rir}</span><span>Repos ${ex.rest}</span></div>
            ${ex.notes ? `<div class="ex-notes">${ex.notes}</div>` : ""}
          </div>
          <span class="ex-chevron ${open ? "open" : ""}">▾</span>
        </button>`;

      if (open) {
        html += `<div class="ex-body">
          <div class="set-headers"><span class="h-prev">Précédent</span><span class="h-kg">kg</span><span class="h-reps">reps</span><span class="h-rest"></span></div>`;
        for (let s = 0; s < ex.sets; s++) {
          const key = genKey(p, state.day, sec.id, exIdx, s);
          const last = history[key];
          const cur = state.current[key] || {};
          hasInputs = true;
          const prevText = last ? `${last.kg || "–"}kg × ${last.reps || "–"} (${dateLabel(last.date)})` : "—";
          html += `<div class="set-row">
            <div class="set-num">${s+1}</div>
            <div class="set-prev">${prevText}</div>
            <input class="set-input kg" type="number" inputmode="decimal" step="0.5" placeholder="${last?.kg || "kg"}" value="${cur.kg || ""}" data-key="${key}" data-field="kg">
            <input class="set-input reps" type="number" inputmode="numeric" placeholder="${last?.reps || "reps"}" value="${cur.reps || ""}" data-key="${key}" data-field="reps">
            <button class="rest-btn" onclick="startRest(${ex.restSec})" title="Repos ${ex.rest}">⏱</button>
          </div>`;
        }
        html += `</div>`;
      }
      html += `</div>`;
    });
    html += `</div>`;
  });

  // Cardio for her
  if (p === "her" && day.her) {
    html += `<div class="section"><div class="section-label pink">Cardio</div>
      <div class="cardio-card">
        <div class="name">${day.her.label}</div>
        <div class="dur">${day.her.duration}</div>
        <div class="info">${day.her.notes}</div>
      </div></div>`;
  }

  // Save
  html += `<div class="save-area"><button class="save-btn" onclick="saveSession()">💾 Sauvegarder la séance</button></div>`;

  // Reset
  html += `<div class="reset"><button class="reset-btn" onclick="clearAll()">Réinitialiser tout l'historique</button></div>`;

  document.getElementById("content").innerHTML = html;
}

// ======================== INIT ========================
loadData();
render();

// Register SW
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
</html>
