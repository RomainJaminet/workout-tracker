<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0c0c0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Workout</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0e;--card:#141418;--card2:#1a1a20;--border:#232329;
  --text:#f0ece6;--text2:#b8b5ae;--muted:#6b6b78;--dim:#3e3e48;
  --him:#22d3ee;--him-bg:#22d3ee10;--him-glow:#22d3ee25;
  --her:#f472b6;--her-bg:#f472b610;--her-glow:#f472b625;
  --green:#34d399;--red:#f87171;--orange:#fb923c;--amber:#fbbf24;
  --radius:14px;--radius-sm:10px;
  --safe-b:env(safe-area-inset-bottom,0px);
  --font:'Outfit',sans-serif;--mono:'Space Mono',monospace;
}
html{background:var(--bg);color:var(--text);font-family:var(--font);
  -webkit-tap-highlight-color:transparent;overscroll-behavior:none}
body{max-width:430px;margin:0 auto;min-height:100dvh;padding-bottom:calc(72px + var(--safe-b))}
input[type=number]{-moz-appearance:textfield}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
button{font-family:var(--font)}

/* ═══ NAV ═══ */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;
  background:#0c0c0eee;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);display:flex;z-index:90;padding-bottom:var(--safe-b)}
.nav button{flex:1;padding:12px 0 10px;background:none;border:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  color:var(--muted);font-size:10px;font-weight:600;letter-spacing:.5px;transition:color .2s}
.nav button.active{color:var(--him)}
.nav button svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* ═══ HEADER ═══ */
.hdr{padding:14px 16px 10px;position:sticky;top:0;z-index:50;
  background:#0c0c0eee;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo{font-size:15px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--text2)}
.person-sw{display:flex;background:var(--card);border-radius:var(--radius-sm);padding:3px;gap:2px}
.p-btn{padding:7px 18px;font-size:12px;font-weight:600;border:none;border-radius:8px;cursor:pointer;
  background:transparent;color:var(--muted);transition:all .25s}
.p-btn.a-him{background:var(--him);color:#0c0c0e}
.p-btn.a-her{background:var(--her);color:#0c0c0e}
.days{display:flex;gap:3px}
.d-btn{flex:1;padding:9px 0;font-size:10px;font-weight:500;border:none;border-radius:var(--radius-sm);
  cursor:pointer;background:transparent;color:var(--dim);transition:all .2s;letter-spacing:.2px;line-height:1.3}
.d-btn.act{background:var(--card2);color:var(--text);font-weight:700}
.d-btn .d-sub{font-size:8px;color:var(--muted);display:block;margin-top:1px;font-weight:400}
.d-btn.act .d-sub{color:var(--text2)}

/* ═══ PAGES ═══ */
.page{display:none;animation:fadeUp .25s ease}
.page.vis{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.day-info{padding:16px 16px 6px}
.day-label{font-size:14px;font-weight:700;color:var(--text);letter-spacing:.3px}
.day-focus{font-size:11px;color:var(--muted);margin-top:4px}

.wu{margin:8px 16px;padding:10px 14px;background:var(--card);border-radius:var(--radius-sm);
  display:flex;align-items:center;gap:10px;border:1px solid var(--border)}
.wu-dot{width:8px;height:8px;border-radius:50%;background:var(--orange);flex-shrink:0}
.wu-t{font-size:12px;color:var(--text2)}

.sec{padding:8px 16px 0}
.sec-t{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:8px}
.sec-t.him-c{color:var(--him)}
.sec-t.her-c{color:var(--her)}

/* ═══ EXERCISE CARD ═══ */
.exc{background:var(--card);border-radius:var(--radius);margin:0 16px 8px;
  border:1px solid var(--border);overflow:hidden;transition:border-color .2s}
.exc.open{border-color:var(--dim)}
.exc-h{width:100%;padding:14px;display:flex;align-items:flex-start;gap:10px;
  background:none;border:none;cursor:pointer;text-align:left}
.exc-idx{width:24px;height:24px;border-radius:7px;background:var(--card2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;
  color:var(--muted);flex-shrink:0;font-family:var(--mono);margin-top:1px}
.exc-info{flex:1;min-width:0}
.exc-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.3}
.exc-meta{font-size:11px;color:var(--muted);margin-top:3px;display:flex;gap:5px;flex-wrap:wrap}
.exc-meta span{background:var(--card2);padding:2px 7px;border-radius:5px;white-space:nowrap}
.exc-note{font-size:10px;color:var(--orange);margin-top:4px;font-weight:500}
.exc-actions{display:flex;flex-direction:column;gap:6px;align-items:center;flex-shrink:0;margin-top:1px}
.exc-demo{width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:var(--card2);
  display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;color:var(--muted);
  transition:all .15s}
.exc-demo:active{background:var(--him-bg);border-color:var(--him);color:var(--him)}
.exc-chev{color:var(--dim);font-size:12px;transition:transform .2s}
.exc.open .exc-chev{transform:rotate(180deg)}

.exc-body{padding:0 14px 14px}
.set-hdr{display:grid;grid-template-columns:26px 1fr 66px 52px 36px;gap:5px;margin-bottom:6px}
.set-hdr span{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--dim)}
.set-hdr .c-kg,.set-hdr .c-r{text-align:center}
.s-row{display:grid;grid-template-columns:26px 1fr 66px 52px 36px;gap:5px;align-items:center;margin-bottom:5px}
.s-num{width:26px;height:26px;border-radius:7px;background:var(--card2);display:flex;
  align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--dim);font-family:var(--mono)}
.s-prev{font-size:10px;color:var(--dim);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.s-prev b{color:var(--muted);font-weight:700}
.s-in{padding:7px 3px;font-size:13px;font-family:var(--mono);font-weight:700;
  background:var(--bg);border:1.5px solid var(--border);border-radius:8px;
  color:var(--text);text-align:center;outline:none;width:100%;transition:border-color .15s}
.s-in:focus{border-color:var(--him)}
.rest-b{width:36px;height:33px;border-radius:7px;border:1.5px solid var(--border);
  background:var(--bg);color:var(--muted);font-size:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s}
.rest-b:active{background:var(--him-bg);border-color:var(--him)}

.cardio{margin:0 16px 8px;padding:16px;border-radius:var(--radius);border:1px solid var(--her-glow);background:var(--her-bg)}
.cardio .c-name{font-size:14px;font-weight:600;color:var(--her)}
.cardio .c-dur{font-size:12px;color:var(--text2);margin-top:4px}
.cardio .c-notes{font-size:11px;color:var(--muted);margin-top:4px}

.finisher{margin:0 16px 8px;padding:12px 14px;border-radius:var(--radius-sm);background:var(--card);border:1px dashed var(--border)}
.finisher .f-t{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:4px}
.finisher .f-name{font-size:13px;font-weight:500;color:var(--text2)}

.save-wrap{padding:16px}
.save-btn{width:100%;padding:15px 0;font-size:14px;font-weight:700;border:none;border-radius:var(--radius);
  cursor:pointer;background:var(--him);color:#0c0c0e;letter-spacing:.5px;
  transition:opacity .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.save-btn:active{opacity:.8}

/* ═══ TIMER ═══ */
.timer{position:fixed;bottom:calc(76px + var(--safe-b));left:50%;transform:translateX(-50%);
  background:var(--card);border-radius:16px;padding:10px 20px;z-index:100;
  display:none;align-items:center;gap:14px;box-shadow:0 12px 40px #000a;border:1px solid var(--border)}
.timer.on{display:flex}
.timer.urg{border-color:var(--red)}
.timer .t-time{font-size:26px;font-family:var(--mono);font-weight:700;color:var(--him);min-width:60px}
.timer.urg .t-time{color:var(--red)}
.timer .t-label{font-size:10px;color:var(--muted);font-weight:500}
.timer .t-x{background:var(--card2);border:none;color:var(--muted);border-radius:8px;
  padding:6px 12px;font-size:12px;cursor:pointer;font-weight:600}

/* ═══ DEMO MODAL ═══ */
.modal-bg{position:fixed;inset:0;background:#000c;z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-bg.on{display:flex}
.modal{width:100%;max-width:430px;max-height:85vh;background:var(--card);border-radius:20px 20px 0 0;
  overflow-y:auto;overscroll-behavior:contain;padding:0;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--dim);margin:12px auto 0}
.modal-head{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:700;color:var(--text)}
.modal-close{background:var(--card2);border:none;color:var(--muted);width:32px;height:32px;
  border-radius:10px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-gif{width:100%;padding:0 20px;margin-bottom:12px}
.modal-gif img{width:100%;border-radius:var(--radius);background:var(--bg);display:block;min-height:180px;object-fit:contain}
.modal-gif .gif-loading{width:100%;height:180px;border-radius:var(--radius);background:var(--bg);
  display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:12px}
.modal-gif .gif-err{display:none;width:100%;padding:16px;border-radius:var(--radius);background:var(--bg);text-align:center}
.modal-gif .gif-err span{font-size:11px;color:var(--dim)}
.modal-cues{padding:0 20px 8px}
.modal-cues h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--him);margin-bottom:8px}
.modal-cue{font-size:13px;color:var(--text2);line-height:1.5;padding:6px 0;border-bottom:1px solid #ffffff06}
.modal-cue:last-child{border:none}
.modal-cue .cue-icon{margin-right:6px}
.modal-links{padding:12px 20px 24px;display:flex;gap:8px}
.modal-link{flex:1;padding:12px;border-radius:var(--radius-sm);border:1px solid var(--border);
  background:var(--card2);text-decoration:none;text-align:center;font-size:12px;font-weight:600;
  color:var(--text2);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.modal-link:active{background:var(--him-bg);border-color:var(--him)}
.modal-link svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}

/* ═══ HISTORY ═══ */
.hist-ex{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  margin:0 16px 8px;overflow:hidden;transition:border-color .2s}
.hist-ex.open{border-color:var(--dim)}
.hist-ex-h{width:100%;padding:14px;display:flex;align-items:center;justify-content:space-between;
  background:none;border:none;cursor:pointer;text-align:left}
.hist-ex-name{font-size:13px;font-weight:600;color:var(--text)}
.hist-ex-sub{font-size:11px;color:var(--muted);margin-top:2px}
.hist-ex-chev{color:var(--dim);font-size:14px;transition:transform .2s;flex-shrink:0}
.hist-ex.open .hist-ex-chev{transform:rotate(180deg)}
.hist-chart-wrap{padding:8px 14px 14px}
.hist-chart-wrap canvas{width:100%!important;height:180px!important}
.hist-no{text-align:center;font-size:12px;color:var(--dim);padding:20px 0}
.hist-table{width:100%;border-collapse:collapse;margin-top:10px}
.hist-table th{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--dim);
  text-align:left;padding:4px 6px;border-bottom:1px solid var(--border)}
.hist-table td{font-size:11px;font-family:var(--mono);color:var(--text2);padding:5px 6px;border-bottom:1px solid #ffffff06}
.hist-table .del-b{background:none;border:none;color:var(--dim);font-size:11px;cursor:pointer;padding:2px 6px}
.hist-table .del-b:active{color:var(--red)}

.reset-area{padding:24px 16px;text-align:center}
.reset-b{background:none;border:none;color:var(--dim);font-size:11px;cursor:pointer;text-decoration:underline;font-family:var(--font)}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-60px);
  background:var(--green);color:#0c0c0e;padding:10px 24px;border-radius:var(--radius-sm);
  font-size:13px;font-weight:600;z-index:300;transition:transform .3s ease;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<nav class="nav">
  <button id="nav-session" class="active" onclick="goPage('session')">
    <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
    SÉANCE
  </button>
  <button id="nav-history" onclick="goPage('history')">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    HISTORIQUE
  </button>
</nav>

<div class="timer" id="timer">
  <div><div class="t-time" id="t-time">0:00</div><div class="t-label">repos</div></div>
  <button class="t-x" onclick="stopTimer()">Stop</button>
</div>
<div class="toast" id="toast"></div>

<!-- DEMO MODAL -->
<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal" id="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeDemo()">✕</button>
    </div>
    <div class="modal-gif" id="modal-gif"></div>
    <div class="modal-cues" id="modal-cues"></div>
    <div class="modal-links" id="modal-links"></div>
  </div>
</div>

<!-- SESSION PAGE -->
<div class="page vis" id="page-session">
  <div class="hdr">
    <div class="hdr-top">
      <span class="logo">Workout</span>
      <div class="person-sw">
        <button class="p-btn a-him" id="pb-him" onclick="setP('him')">Moi</button>
        <button class="p-btn" id="pb-her" onclick="setP('her')">Elle</button>
      </div>
    </div>
    <div class="days" id="days"></div>
  </div>
  <div id="sc"></div>
</div>

<!-- HISTORY PAGE -->
<div class="page" id="page-history">
  <div class="hdr">
    <div class="hdr-top">
      <span class="logo">Historique</span>
      <div class="person-sw">
        <button class="p-btn a-him" id="hpb-him" onclick="setHP('him')">Moi</button>
        <button class="p-btn" id="hpb-her" onclick="setHP('her')">Elle</button>
      </div>
    </div>
  </div>
  <div id="hc"></div>
</div>

<script>

// PROGRAM DATA — PPL A/B 6 JOURS

  finisher:null,

    {name:"Incline chest press machine",sets:3,reps:"8–12",rest:"90s",rs:90,notes:""},

  ],

  him:[

    {name:"Élévations latérales poulie",sets:5,reps:"12–20",rest:"60–75s",rs:65,notes:""},
    {name:"Pushdown triceps",sets:2,reps:"10–15",rest:"60–90s",rs:75,notes:""},

},

async function loadGif(query,name){
  const imgEl=document.getElementById("gif-img");
  const loadEl=document.getElementById("gif-load");
  const errEl=document.getElementById("gif-err");
  try{
    // Try Tenor v2 with Google's public demo key
    const resp=await fetch(`https://tenor.googleapis.com/v2/search?q=${query}&key=AIzaSyAyimkuYQYF_FXVALexPuGQctUWRURdCYQ&limit=1&media_filter=gif&contentfilter=high`);
    if(!resp.ok)throw new Error("API error");
    const data=await resp.json();
    if(data.results&&data.results.length>0){
      const gif=data.results[0].media_formats.gif||data.results[0].media_formats.mediumgif||data.results[0].media_formats.tinygif;
      if(gif&&gif.url){
        imgEl.onload=()=>{loadEl.style.display="none";imgEl.style.display="block"};
        imgEl.onerror=()=>{loadEl.style.display="none";errEl.style.display="block"};
        imgEl.src=gif.url;
        return;
      }
    }
    throw new Error("No results");
  }catch(e){
    // Fallback: try with a different search
    try{
      const q2=name.split(/[ /]/).slice(0,3).join("+")+("+exercise+gif");
      const resp2=await fetch(`https://tenor.googleapis.com/v2/search?q=${q2}&key=AIzaSyAyimkuYQYF_FXVALexPuGQctUWRURdCYQ&limit=1&media_filter=gif&contentfilter=high`);
      if(resp2.ok){
        const data2=await resp2.json();
        if(data2.results&&data2.results.length>0){
          const gif2=data2.results[0].media_formats.gif||data2.results[0].media_formats.mediumgif||data2.results[0].media_formats.tinygif;
          if(gif2&&gif2.url){
            imgEl.onload=()=>{loadEl.style.display="none";imgEl.style.display="block"};
            imgEl.onerror=()=>{loadEl.style.display="none";errEl.style.display="block"};
            imgEl.src=gif2.url;
            return;
          }
        }
      }
    }catch(e2){}
    loadEl.style.display="none";errEl.style.display="block";
  }
}

// ═══ SAVE ═══
function saveSession(){
  const now=new Date().toISOString();const saved=new Set();
  document.querySelectorAll(".s-row").forEach(row=>{
    const inputs=row.querySelectorAll("[data-k]");if(inputs.length<2)return;
    const key=inputs[0].dataset.k;
    const kg=inputs[0].dataset.f==="kg"?inputs[0].value.trim():inputs[1].value.trim();
    const reps=inputs[0].dataset.f==="reps"?inputs[0].value.trim():inputs[1].value.trim();
    if(!kg&&!reps)return;
    if(saved.has(key))return;saved.add(key);
    if(!H[key])H[key]=[];
    H[key].push({kg,reps,date:now});
  });
  if(!saved.size){toast("Remplis au moins une série");return}
  sv();toast(`${saved.size} série${saved.size>1?"s":""} sauvegardée${saved.size>1?"s":""} ✓`);
  S.exp={};renderS();
}
function clearAll(){if(!confirm("Effacer TOUT l'historique ?"))return;H={};localStorage.removeItem(SK);destroyCharts();toast("Historique effacé");renderS();renderH()}
function deleteEntry(key,idx){if(!H[key])return;H[key].splice(idx,1);if(!H[key].length)delete H[key];sv();destroyCharts();renderH()}

function exC(ex,i,sec,person){
  const eid=`${sec}-${i}`,open=S.exp[eid];
  const hasDemo=!!DEMOS[ex.name];
  let h=`<div class="exc ${open?"open":""}">
    <button class="exc-h" onclick="tgEx('${eid}')">
      <div class="exc-idx">${i+1}</div>
      <div class="exc-info">
        <div class="exc-name">${ex.name}</div>
        <div class="exc-meta"><span>${ex.sets}×${ex.reps}</span><span>${ex.rest}</span></div>
        ${ex.notes?`<div class="exc-note">${ex.notes}</div>`:""}
      </div>
      <div class="exc-actions">
        ${hasDemo?`<div class="exc-demo" onclick="showDemo('${ex.name.replace(/'/g,"\\'")}',event)" title="Voir la démo">?</div>`:""}
        <span class="exc-chev">▾</span>
      </div>
    </button>`;
  if(open){
    h+=`<div class="exc-body"><div class="set-hdr"><span></span><span>précédent</span><span class="c-kg">kg</span><span class="c-r">reps</span><span></span></div>`;
    for(let s=0;s<ex.sets;s++){
      const k=gk(person,S.day,sec,i,s),arr=H[k]||[],last=arr.length?arr[arr.length-1]:null;
      const prev=last?`<b>${last.kg||"–"}</b>kg×<b>${last.reps||"–"}</b> <span style="opacity:.5">${dl(last.date)}</span>`:"—";
      h+=`<div class="s-row"><div class="s-num">${s+1}</div><div class="s-prev">${prev}</div>
        <input class="s-in" type="number" inputmode="decimal" step="0.5" placeholder="${last?.kg||"kg"}" data-k="${k}" data-f="kg">
        <input class="s-in" type="number" inputmode="numeric" placeholder="${last?.reps||""}" data-k="${k}" data-f="reps">
        <button class="rest-b" onclick="startRest(${ex.rs})">⏱</button></div>`;
    }
    h+=`</div>`;
  }
  return h+`</div>`;
}

function renderH(){
  const p=S.hp;
  document.getElementById("hpb-him").className=`p-btn ${p==="him"?"a-him":""}`;
  document.getElementById("hpb-her").className=`p-btn ${p==="her"?"a-her":""}`;
  const exMap=new Map();
  DAYS.forEach(d=>{const day=P[d];
    const add=(list,sec)=>{list.forEach((ex,i)=>{
      if(!exMap.has(ex.name))exMap.set(ex.name,{sets:ex.sets,entries:[]});
      exMap.get(ex.name).entries.push({day:d,sec,idx:i,sets:ex.sets});
    })};
    add(day.common,"common");
    if(p==="him")add(day.him,"him");
  });
  let h="";
  if(!exMap.size){h=`<div class="hist-no">Aucun exercice</div>`;document.getElementById("hc").innerHTML=h;return}
  exMap.forEach((info,name)=>{
    const hid=name.replace(/[^a-zA-Z0-9]/g,"");
    const open=S.hexp[hid];
    let total=0;
    info.entries.forEach(e=>{for(let s=0;s<e.sets;s++){const k=gk(p,e.day,e.sec,e.idx,s);if(H[k])total+=H[k].length}});
    h+=`<div class="hist-ex ${open?"open":""}">
      <button class="hist-ex-h" onclick="tgHEx('${hid}')"><div>
        <div class="hist-ex-name">${name}</div>
        <div class="hist-ex-sub">${total} entrée${total>1?"s":""} · ${info.entries.map(e=>e.day).join(", ")}</div>
      </div><span class="hist-ex-chev">▾</span></button>`;
    if(open){
      h+=`<div class="hist-chart-wrap"><canvas id="ch-${hid}"></canvas>`;
      let pts=[];
      info.entries.forEach(e=>{for(let s=0;s<e.sets;s++){const k=gk(p,e.day,e.sec,e.idx,s);
        if(H[k])H[k].forEach((r,ri)=>{pts.push({...r,key:k,ri,set:s+1,day:e.day})})}});
      pts.sort((a,b)=>new Date(b.date)-new Date(a.date));
      if(pts.length){
        h+=`<table class="hist-table"><thead><tr><th>Date</th><th>Jour</th><th>S</th><th>kg</th><th>Reps</th><th></th></tr></thead><tbody>`;
        pts.slice(0,20).forEach(pt=>{
          h+=`<tr><td>${dl(pt.date)}</td><td style="font-size:9px">${pt.day}</td><td>${pt.set}</td><td>${pt.kg||"–"}</td><td>${pt.reps||"–"}</td>
            <td><button class="del-b" onclick="deleteEntry('${pt.key}',${pt.ri})">✕</button></td></tr>`;
        });
        h+=`</tbody></table>`;
        if(pts.length>20)h+=`<div style="text-align:center;font-size:10px;color:var(--dim);padding:8px 0">+${pts.length-20} entrées</div>`;
      }
      h+=`</div>`;
    }
    h+=`</div>`;
  });
  h+=`<div class="reset-area"><button class="reset-b" onclick="clearAll()">Réinitialiser l'historique</button></div>`;
  document.getElementById("hc").innerHTML=h;
  // Charts
  exMap.forEach((info,name)=>{
    const hid=name.replace(/[^a-zA-Z0-9]/g,"");
    if(!S.hexp[hid])return;
    const cv=document.getElementById(`ch-${hid}`);if(!cv)return;
    let pts=[];
    info.entries.forEach(e=>{for(let s=0;s<e.sets;s++){const k=gk(p,e.day,e.sec,e.idx,s);
      if(H[k])H[k].forEach(r=>{if(r.kg)pts.push({date:new Date(r.date),kg:parseFloat(r.kg),reps:parseInt(r.reps)||0})})}});
    pts.sort((a,b)=>a.date-b.date);
    if(!pts.length){cv.parentElement.insertAdjacentHTML("afterbegin",`<div class="hist-no">Pas encore de données</div>`);cv.style.display="none";return}
    const sess=[];let ld2="";
    pts.forEach(pt=>{const d=pt.date.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit"});
      if(d!==ld2){sess.push({label:d,maxKg:pt.kg,maxReps:pt.reps});ld2=d}
      else{const c=sess[sess.length-1];if(pt.kg>c.maxKg){c.maxKg=pt.kg;c.maxReps=pt.reps}
        else if(pt.kg===c.maxKg&&pt.reps>c.maxReps)c.maxReps=pt.reps}});
    const ac=p==="him"?"#22d3ee":"#f472b6",abg=p==="him"?"#22d3ee18":"#f472b618";
    charts[hid]=new Chart(cv,{type:"line",
      data:{labels:sess.map(s=>s.label),datasets:[{label:"kg",data:sess.map(s=>s.maxKg),
        borderColor:ac,backgroundColor:abg,fill:true,tension:.35,pointRadius:4,
        pointBackgroundColor:ac,pointBorderColor:"#141418",pointBorderWidth:2,borderWidth:2.5}]},
      options:{responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},
        plugins:{legend:{display:false},tooltip:{backgroundColor:"#1a1a20",borderColor:"#232329",borderWidth:1,
          titleFont:{family:"Outfit",size:12},bodyFont:{family:"Space Mono",size:12},
          callbacks:{label:ctx=>`${ctx.raw} kg · ${sess[ctx.dataIndex].maxReps} reps`}}},
        scales:{x:{grid:{color:"#ffffff06"},ticks:{color:"#6b6b78",font:{family:"Outfit",size:10}},border:{color:"#232329"}},
          y:{grid:{color:"#ffffff06"},ticks:{color:"#6b6b78",font:{family:"Space Mono",size:10}},border:{color:"#232329"},
            title:{display:true,text:"kg",color:"#6b6b78",font:{family:"Outfit",size:10}}}}}});
  });
}

// ═══ INIT ═══
ld();renderS();
if("serviceWorker"in navigator)navigator.serviceWorker.register("./sw.js").catch(()=>{});
</script>
