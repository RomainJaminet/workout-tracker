<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0c0c0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Workout</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0e;--card:#141418;--card2:#1a1a20;--border:#232329;
  --text:#f0ece6;--text2:#b8b5ae;--muted:#6b6b78;--dim:#3e3e48;
  --him:#22d3ee;--him-bg:#22d3ee12;--him-border:#22d3ee30;
  --her:#f472b6;--her-bg:#f472b612;--her-border:#f472b630;
  --green:#34d399;--red:#f87171;--orange:#fb923c;
  --radius:14px;--radius-sm:10px;
  --safe-b:env(safe-area-inset-bottom,0px);
  --font:'Outfit',sans-serif;--mono:'Space Mono',monospace;
}
html{background:var(--bg);color:var(--text);font-family:var(--font);-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
body{max-width:430px;margin:0 auto;min-height:100dvh;padding-bottom:calc(72px + var(--safe-b))}
input[type=number]{-moz-appearance:textfield}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
button{font-family:var(--font)}

/* NAV */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;
  background:#0c0c0eee;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);display:flex;z-index:90;padding-bottom:var(--safe-b)}
.nav button{flex:1;padding:12px 0 10px;background:none;border:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  color:var(--muted);font-size:10px;font-weight:600;letter-spacing:.5px;transition:color .2s}
.nav button.active{color:var(--him)}
.nav button svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* HEADER */
.hdr{padding:14px 16px 10px;position:sticky;top:0;z-index:50;
  background:#0c0c0eee;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo{font-size:15px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--text2)}
.person-sw{display:flex;background:var(--card);border-radius:var(--radius-sm);padding:3px;gap:2px}
.p-btn{padding:7px 18px;font-size:12px;font-weight:600;border:none;border-radius:8px;cursor:pointer;
  background:transparent;color:var(--muted);transition:all .25s}
.p-btn.a-him{background:var(--him);color:#0c0c0e}
.p-btn.a-her{background:var(--her);color:#0c0c0e}
.days{display:flex;gap:3px}
.d-btn{flex:1;padding:9px 0;font-size:11px;font-weight:500;border:none;border-radius:var(--radius-sm);
  cursor:pointer;background:transparent;color:var(--dim);transition:all .2s;letter-spacing:.3px}
.d-btn.act{background:var(--card2);color:var(--text);font-weight:700}

/* PAGES */
.page{display:none;animation:fadeUp .3s ease}
.page.vis{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.day-info{padding:16px 16px 6px}
.day-label{font-size:13px;font-weight:700;color:var(--text);letter-spacing:.5px}
.day-focus{font-size:11px;color:var(--muted);margin-top:4px}

.wu{margin:8px 16px;padding:10px 14px;background:var(--card);border-radius:var(--radius-sm);
  display:flex;align-items:center;gap:10px;border:1px solid var(--border)}
.wu-dot{width:8px;height:8px;border-radius:50%;background:var(--orange);flex-shrink:0}
.wu-t{font-size:12px;color:var(--text2)}

.sec{padding:6px 16px 0}
.sec-t{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:8px}
.sec-t.him-c{color:var(--him)}
.sec-t.her-c{color:var(--her)}

/* EXERCISE CARD */
.exc{background:var(--card);border-radius:var(--radius);margin:0 16px 8px;
  border:1px solid var(--border);overflow:hidden;transition:border-color .2s}
.exc.open{border-color:var(--dim)}
.exc-h{width:100%;padding:14px;display:flex;align-items:flex-start;gap:12px;
  background:none;border:none;cursor:pointer;text-align:left}
.exc-idx{width:24px;height:24px;border-radius:7px;background:var(--card2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;
  color:var(--muted);flex-shrink:0;font-family:var(--mono);margin-top:1px}
.exc-info{flex:1;min-width:0}
.exc-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.3}
.exc-meta{font-size:11px;color:var(--muted);margin-top:3px;display:flex;gap:6px;flex-wrap:wrap}
.exc-meta span{background:var(--card2);padding:2px 7px;border-radius:5px;white-space:nowrap}
.exc-note{font-size:10px;color:var(--orange);margin-top:4px;font-weight:500}
.exc-chev{color:var(--dim);font-size:14px;transition:transform .2s;margin-top:3px;flex-shrink:0}
.exc.open .exc-chev{transform:rotate(180deg)}

.exc-body{padding:0 14px 14px}
.set-hdr{display:grid;grid-template-columns:28px 1fr 68px 54px 38px;gap:6px;margin-bottom:6px}
.set-hdr span{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--dim)}
.set-hdr .c-kg,.set-hdr .c-r{text-align:center}
.s-row{display:grid;grid-template-columns:28px 1fr 68px 54px 38px;gap:6px;align-items:center;margin-bottom:5px}
.s-num{width:28px;height:28px;border-radius:8px;background:var(--card2);display:flex;
  align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--dim);font-family:var(--mono)}
.s-prev{font-size:10px;color:var(--dim);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.s-prev b{color:var(--muted);font-weight:700}
.s-in{padding:7px 4px;font-size:14px;font-family:var(--mono);font-weight:700;
  background:var(--bg);border:1.5px solid var(--border);border-radius:8px;
  color:var(--text);text-align:center;outline:none;width:100%;transition:border-color .15s}
.s-in:focus{border-color:var(--him)}
.rest-b{width:38px;height:34px;border-radius:8px;border:1.5px solid var(--border);
  background:var(--bg);color:var(--muted);font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s}
.rest-b:active{background:var(--him-bg);border-color:var(--him)}

.cardio{margin:0 16px 8px;padding:16px;border-radius:var(--radius);border:1px solid var(--her-border);background:var(--her-bg)}
.cardio .c-name{font-size:14px;font-weight:600;color:var(--her)}
.cardio .c-dur{font-size:12px;color:var(--text2);margin-top:4px}
.cardio .c-notes{font-size:11px;color:var(--muted);margin-top:4px}

.finisher{margin:0 16px 8px;padding:12px 14px;border-radius:var(--radius-sm);background:var(--card);border:1px dashed var(--border)}
.finisher .f-t{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:4px}
.finisher .f-name{font-size:13px;font-weight:500;color:var(--text2)}

.save-wrap{padding:16px}
.save-btn{width:100%;padding:15px 0;font-size:14px;font-weight:700;border:none;border-radius:var(--radius);
  cursor:pointer;background:var(--him);color:#0c0c0e;letter-spacing:.5px;
  transition:opacity .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.save-btn:active{opacity:.8}

.timer{position:fixed;bottom:calc(76px + var(--safe-b));left:50%;transform:translateX(-50%);
  background:var(--card);border-radius:16px;padding:10px 20px;z-index:100;
  display:none;align-items:center;gap:14px;box-shadow:0 12px 40px #000a;border:1px solid var(--border)}
.timer.on{display:flex}
.timer.urg{border-color:var(--red)}
.timer .t-time{font-size:26px;font-family:var(--mono);font-weight:700;color:var(--him);min-width:60px}
.timer.urg .t-time{color:var(--red)}
.timer .t-label{font-size:10px;color:var(--muted);font-weight:500}
.timer .t-x{background:var(--card2);border:none;color:var(--muted);border-radius:8px;
  padding:6px 12px;font-size:12px;cursor:pointer;font-weight:600}

/* HISTORY */
.hist-ex{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  margin:0 16px 8px;overflow:hidden;transition:border-color .2s}
.hist-ex.open{border-color:var(--dim)}
.hist-ex-h{width:100%;padding:14px;display:flex;align-items:center;justify-content:space-between;
  background:none;border:none;cursor:pointer;text-align:left}
.hist-ex-name{font-size:13px;font-weight:600;color:var(--text)}
.hist-ex-sub{font-size:11px;color:var(--muted);margin-top:2px}
.hist-ex-chev{color:var(--dim);font-size:14px;transition:transform .2s;flex-shrink:0}
.hist-ex.open .hist-ex-chev{transform:rotate(180deg)}
.hist-chart-wrap{padding:8px 14px 14px}
.hist-chart-wrap canvas{width:100%!important;height:180px!important}
.hist-no{text-align:center;font-size:12px;color:var(--dim);padding:20px 0}
/* History detail table */
.hist-table{width:100%;border-collapse:collapse;margin-top:10px}
.hist-table th{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);
  text-align:left;padding:4px 6px;border-bottom:1px solid var(--border)}
.hist-table td{font-size:11px;font-family:var(--mono);color:var(--text2);padding:5px 6px;
  border-bottom:1px solid #ffffff06}
.hist-table .del-b{background:none;border:none;color:var(--dim);font-size:12px;cursor:pointer;padding:2px 6px}
.hist-table .del-b:hover{color:var(--red)}

.reset-area{padding:24px 16px;text-align:center}
.reset-b{background:none;border:none;color:var(--dim);font-size:11px;cursor:pointer;text-decoration:underline;font-family:var(--font)}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-60px);
  background:var(--green);color:#0c0c0e;padding:10px 24px;border-radius:var(--radius-sm);
  font-size:13px;font-weight:600;z-index:200;transition:transform .3s ease;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<nav class="nav">
  <button id="nav-session" class="active" onclick="goPage('session')">
    <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
    SÉANCE
  </button>
  <button id="nav-history" onclick="goPage('history')">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    HISTORIQUE
  </button>
</nav>

<div class="timer" id="timer">
  <div><div class="t-time" id="t-time">0:00</div><div class="t-label">repos</div></div>
  <button class="t-x" onclick="stopTimer()">Stop</button>
</div>

<div class="toast" id="toast"></div>

<div class="page vis" id="page-session">
  <div class="hdr">
    <div class="hdr-top">
      <span class="logo">Workout</span>
      <div class="person-sw">
        <button class="p-btn a-him" id="pb-him" onclick="setP('him')">Moi</button>
        <button class="p-btn" id="pb-her" onclick="setP('her')">Elle</button>
      </div>
    </div>
    <div class="days" id="days"></div>
  </div>
  <div id="sc"></div>
</div>

<div class="page" id="page-history">
  <div class="hdr">
    <div class="hdr-top">
      <span class="logo">Historique</span>
      <div class="person-sw">
        <button class="p-btn a-him" id="hpb-him" onclick="setHP('him')">Moi</button>
        <button class="p-btn" id="hpb-her" onclick="setHP('her')">Elle</button>
      </div>
    </div>
  </div>
  <div id="hc"></div>
</div>

<script>
const P={
J1:{label:"J1 — Haut",sub:"Push + posture",emoji:"🔵",warmup:"Rameur — 5 min",
  common:[
    {name:"Chest press machine",sets:3,reps:"8–12",rest:"90s",rs:90,notes:""},
    {name:"Rowing poulie neutre",sets:3,reps:"10–12",rest:"90s",rs:90,notes:""},
    {name:"Reverse pec deck",sets:3,reps:"12–15",rest:"60s",rs:60,notes:""}
  ],
  her:{label:"Marche inclinée",duration:"30 min",notes:"5–7 % · 5–6 km/h"},
  him:[
    {name:"Développé incliné machine",sets:3,reps:"8–12",rest:"2 min",rs:120,notes:""},
    {name:"Élévations latérales poulie",sets:4,reps:"12–20",rest:"60–90s",rs:75,notes:""},
    {name:"Triceps corde",sets:3,reps:"10–15",rest:"60–90s",rs:75,notes:""},
    {name:"Curl pupitre",sets:3,reps:"8–12",rest:"60–90s",rs:75,notes:""}
  ],
  finisher:"Gainage planche — 3×60s",himFocus:"Pecs, épaules, triceps, biceps",herFocus:"Entretien haut du corps + cardio"},
J2:{label:"J2 — Bas",sub:"Quad intelligent + ischios",emoji:"🟢",warmup:"Vélo — 5 min",
  common:[
    {name:"Leg press",sets:3,reps:"10–12",rest:"90s",rs:90,notes:"Pieds hauts (elle : safe genoux)"},
    {name:"Leg curl",sets:4,reps:"10–12",rest:"90s",rs:90,notes:""},
    {name:"Romanian deadlift",sets:3,reps:"8–10",rest:"2 min",rs:120,notes:""}
  ],
  her:{label:"Marche inclinée",duration:"30 min",notes:""},
  him:[
    {name:"Hack squat / presse quad",sets:3,reps:"8–12",rest:"2 min",rs:120,notes:"Pieds bas → VMO"},
    {name:"Mollets debout",sets:4,reps:"10–15",rest:"60–90s",rs:75,notes:""},
    {name:"Mollets assis",sets:3,reps:"12–20",rest:"60–90s",rs:75,notes:""},
    {name:"Crunch câble",sets:3,reps:"12–15",rest:"60s",rs:60,notes:""}
  ],
  finisher:null,himFocus:"Quadriceps, ischios, mollets, abdos",herFocus:"Bas du corps + cardio"},
J3:{label:"J3 — Haut",sub:"Tirage + biceps",emoji:"🟣",warmup:"Rameur — 5 min",
  common:[
    {name:"Lat pulldown",sets:3,reps:"10–12",rest:"90s",rs:90,notes:""},
    {name:"Rowing machine",sets:3,reps:"8–12",rest:"90s",rs:90,notes:""},
    {name:"Face pull",sets:3,reps:"12–15",rest:"60s",rs:60,notes:""}
  ],
  her:{label:"Marche inclinée",duration:"30 min",notes:""},
  him:[
    {name:"Tirage unilatéral poulie",sets:3,reps:"10–12",rest:"90s",rs:90,notes:""},
    {name:"Rowing poulie",sets:3,reps:"10–12",rest:"90s",rs:90,notes:""},
    {name:"Curl incliné poulie",sets:3,reps:"10–15",rest:"60–90s",rs:75,notes:""},
    {name:"Reverse curl",sets:2,reps:"12–15",rest:"60s",rs:60,notes:""}
  ],
  finisher:"Gainage latéral — 2×30s",himFocus:"Dos, biceps, avant-bras",herFocus:"Dos entretien, posture + cardio"},
J4:{label:"J4 — Bas",sub:"Arrière + glutes",emoji:"🟡",warmup:"Vélo — 5 min",
  common:[
    {name:"Romanian deadlift",sets:3,reps:"8–10",rest:"2 min",rs:120,notes:""},
    {name:"Cable glute kickback",sets:3,reps:"12–15",rest:"60–90s",rs:75,notes:""},
    {name:"Abduction machine",sets:3,reps:"15–20",rest:"60s",rs:60,notes:""}
  ],
  her:{label:"Marche inclinée",duration:"30 min",notes:""},
  him:[
    {name:"Leg curl",sets:3,reps:"10–12",rest:"90s",rs:90,notes:""},
    {name:"Hip thrust",sets:3,reps:"8–12",rest:"90s",rs:90,notes:""},
    {name:"Mollets debout",sets:4,reps:"10–15",rest:"60–90s",rs:75,notes:""}
  ],
  finisher:null,himFocus:"Ischios, fessiers, mollets",herFocus:"Glutes, ischios + cardio"},
J5:{label:"J5 — Haut",sub:"Épaules + bras esthétique",emoji:"🔴",warmup:"Rameur — 5 min",
  common:[
    {name:"Chest press",sets:3,reps:"10–12",rest:"90s",rs:90,notes:""},
    {name:"Rowing poulie",sets:3,reps:"10–12",rest:"90s",rs:90,notes:""},
    {name:"Développé militaire machine",sets:3,reps:"8–12",rest:"90s",rs:90,notes:""}
  ],
  her:{label:"Marche inclinée",duration:"30 min",notes:""},
  him:[
    {name:"Élévations latérales poulie",sets:4,reps:"15–20",rest:"60s",rs:60,notes:""},
    {name:"Oiseau unilatéral poulie",sets:3,reps:"12–20",rest:"60s",rs:60,notes:"Rear delt"},
    {name:"Bayesian curl",sets:3,reps:"10–15",rest:"60–90s",rs:75,notes:""},
    {name:"Curl marteau corde",sets:3,reps:"10–15",rest:"60–90s",rs:75,notes:""},
    {name:"Triceps overhead",sets:3,reps:"10–15",rest:"60–90s",rs:75,notes:""}
  ],
  finisher:null,himFocus:"Épaules, rear delt, biceps, triceps",herFocus:"Entretien haut du corps + cardio"}
};
const DAYS=["J1","J2","J3","J4","J5"];

// STATE
let S={day:"J1",person:"him",page:"session",hp:"him",exp:{},hexp:{}};
let H={};let charts={};let tI=null,tL=0;
const SK="wt_v4";

function ld(){try{const r=localStorage.getItem(SK);if(r){H=JSON.parse(r).h||{}}}catch(e){}}
function sv(){try{localStorage.setItem(SK,JSON.stringify({h:H}))}catch(e){alert("Erreur")}}
function gk(p,d,sec,ei,si){return`${p}|${d}|${sec}|${ei}|${si}`}
function dl(d){if(!d)return"";const t=new Date(d);return`${String(t.getDate()).padStart(2,"0")}/${String(t.getMonth()+1).padStart(2,"0")}`}

// TIMER
function startRest(s){stopTimer();tL=s;document.getElementById("timer").classList.add("on");updT();
tI=setInterval(()=>{tL--;if(tL<=0){stopTimer();if(navigator.vibrate)navigator.vibrate([200,100,200]);return}updT()},1000)}
function updT(){const e=document.getElementById("timer"),t=document.getElementById("t-time");
t.textContent=`${Math.floor(tL/60)}:${String(tL%60).padStart(2,"0")}`;e.classList.toggle("urg",tL<=5)}
function stopTimer(){if(tI)clearInterval(tI);tI=null;document.getElementById("timer").classList.remove("on")}

function toast(m){const e=document.getElementById("toast");e.textContent=m;e.classList.add("show");setTimeout(()=>e.classList.remove("show"),2000)}

// NAVIGATION
function setP(p){S.person=p;S.exp={};renderS()}
function setHP(p){S.hp=p;S.hexp={};destroyCharts();renderH()}
function setDay(d){S.day=d;S.exp={};renderS()}
function tgEx(id){S.exp[id]=!S.exp[id];renderS()}
function tgHEx(id){S.hexp[id]=!S.hexp[id];destroyCharts();renderH()}
function goPage(p){S.page=p;
  document.getElementById("page-session").classList.toggle("vis",p==="session");
  document.getElementById("page-history").classList.toggle("vis",p==="history");
  document.getElementById("nav-session").classList.toggle("active",p==="session");
  document.getElementById("nav-history").classList.toggle("active",p==="history");
  if(p==="history"){destroyCharts();renderH()}}
function destroyCharts(){Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});charts={}}

function saveSession(){
  const now=new Date().toISOString();let n=0;
  document.querySelectorAll("[data-k]").forEach(inp=>{
    const k=inp.dataset.k,f=inp.dataset.f,v=inp.value.trim();
    if(!v)return;
    // Find matching pair
    const row=inp.closest(".s-row");
    if(!row)return;
    const inputs=row.querySelectorAll("[data-k]");
    let kg="",reps="";
    inputs.forEach(i=>{if(i.dataset.f==="kg")kg=i.value.trim();if(i.dataset.f==="reps")reps=i.value.trim()});
    if(!kg&&!reps)return;
    const key=inputs[0].dataset.k;
    if(!H[key])H[key]=[];
    // Avoid double-insert: check if already added this call
    const last=H[key].length?H[key][H[key].length-1]:null;
    if(last&&last.date===now)return;
    H[key].push({kg,reps,date:now});n++;
  });
  // Deduplicate: only count unique keys
  if(n===0){toast("Remplis au moins une série");return}
  sv();toast("Sauvegardé ✓");S.exp={};renderS();
}

function clearAll(){if(!confirm("Effacer TOUT l'historique ?"))return;H={};localStorage.removeItem(SK);destroyCharts();toast("Historique effacé");renderS();renderH()}

function deleteEntry(key,idx){
  if(!H[key])return;H[key].splice(idx,1);if(!H[key].length)delete H[key];sv();destroyCharts();renderH();
}

// ═══ RENDER SESSION ═══
function renderS(){
  const day=P[S.day],p=S.person;
  document.getElementById("pb-him").className=`p-btn ${p==="him"?"a-him":""}`;
  document.getElementById("pb-her").className=`p-btn ${p==="her"?"a-her":""}`;
  document.getElementById("days").innerHTML=DAYS.map(d=>
    `<button class="d-btn ${S.day===d?"act":""}" onclick="setDay('${d}')">${d}</button>`).join("");

  let h=`<div class="day-info"><div class="day-label">${day.emoji} ${day.label} <span style="color:var(--muted);font-weight:400">— ${day.sub}</span></div>
    <div class="day-focus">${p==="him"?day.himFocus:day.herFocus}</div></div>`;
  h+=`<div class="wu"><div class="wu-dot"></div><div class="wu-t">${day.warmup}</div></div>`;

  if(day.common.length){
    h+=`<div class="sec"><div class="sec-t">Bloc commun</div></div>`;
    day.common.forEach((ex,i)=>{h+=exC(ex,i,"common",p)});
  }
  if(p==="him"&&day.him.length){
    h+=`<div class="sec"><div class="sec-t him-c">Spécialisation</div></div>`;
    day.him.forEach((ex,i)=>{h+=exC(ex,i,"him",p)});
  }
  if(p==="her"&&day.her){
    h+=`<div class="sec"><div class="sec-t her-c">Cardio</div></div>`;
    h+=`<div class="cardio"><div class="c-name">${day.her.label}</div>
      <div class="c-dur">${day.her.duration}</div>
      ${day.her.notes?`<div class="c-notes">${day.her.notes}</div>`:""}</div>`;
  }
  if(day.finisher)h+=`<div class="finisher"><div class="f-t">Finisher</div><div class="f-name">${day.finisher}</div></div>`;
  h+=`<div class="save-wrap"><button class="save-btn" onclick="saveSession()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
    Sauvegarder la séance</button></div>`;
  h+=`<div class="reset-area"><button class="reset-b" onclick="clearAll()">Réinitialiser l'historique</button></div>`;
  document.getElementById("sc").innerHTML=h;
}

function exC(ex,i,sec,person){
  const eid=`${sec}-${i}`,open=S.exp[eid];
  let h=`<div class="exc ${open?"open":""}">
    <button class="exc-h" onclick="tgEx('${eid}')">
      <div class="exc-idx">${i+1}</div><div class="exc-info">
        <div class="exc-name">${ex.name}</div>
        <div class="exc-meta"><span>${ex.sets}×${ex.reps}</span><span>${ex.rest}</span></div>
        ${ex.notes?`<div class="exc-note">${ex.notes}</div>`:""}</div>
      <span class="exc-chev">▾</span></button>`;
  if(open){
    h+=`<div class="exc-body"><div class="set-hdr"><span></span><span>précédent</span><span class="c-kg">kg</span><span class="c-r">reps</span><span></span></div>`;
    for(let s=0;s<ex.sets;s++){
      const k=gk(person,S.day,sec,i,s),arr=H[k]||[],last=arr.length?arr[arr.length-1]:null;
      const prev=last?`<b>${last.kg||"–"}</b>kg × <b>${last.reps||"–"}</b> <span style="opacity:.5">${dl(last.date)}</span>`:"—";
      h+=`<div class="s-row"><div class="s-num">${s+1}</div><div class="s-prev">${prev}</div>
        <input class="s-in" type="number" inputmode="decimal" step="0.5" placeholder="${last?.kg||"kg"}" data-k="${k}" data-f="kg">
        <input class="s-in" type="number" inputmode="numeric" placeholder="${last?.reps||""}" data-k="${k}" data-f="reps">
        <button class="rest-b" onclick="startRest(${ex.rs})">⏱</button></div>`;
    }
    h+=`</div>`;
  }
  return h+`</div>`;
}

// ═══ RENDER HISTORY ═══
function renderH(){
  const p=S.hp;
  document.getElementById("hpb-him").className=`p-btn ${p==="him"?"a-him":""}`;
  document.getElementById("hpb-her").className=`p-btn ${p==="her"?"a-her":""}`;

  const exMap=new Map();
  DAYS.forEach(d=>{const day=P[d];
    const add=(list,sec)=>{list.forEach((ex,i)=>{
      if(!exMap.has(ex.name))exMap.set(ex.name,{sets:ex.sets,entries:[]});
      exMap.get(ex.name).entries.push({day:d,sec,idx:i,sets:ex.sets});
    })};
    add(day.common,"common");
    if(p==="him")add(day.him,"him");
  });

  let h="";
  if(!exMap.size){h=`<div class="hist-no">Aucun exercice</div>`;document.getElementById("hc").innerHTML=h;return}

  exMap.forEach((info,name)=>{
    const hid=name.replace(/[^a-zA-Z0-9]/g,"");
    const open=S.hexp[hid];
    let total=0;
    info.entries.forEach(e=>{for(let s=0;s<e.sets;s++){const k=gk(p,e.day,e.sec,e.idx,s);if(H[k])total+=H[k].length}});

    h+=`<div class="hist-ex ${open?"open":""}">
      <button class="hist-ex-h" onclick="tgHEx('${hid}')"><div>
        <div class="hist-ex-name">${name}</div>
        <div class="hist-ex-sub">${total} entrée${total>1?"s":""} · ${info.entries.map(e=>e.day).join(", ")}</div>
      </div><span class="hist-ex-chev">▾</span></button>`;
    if(open){
      h+=`<div class="hist-chart-wrap"><canvas id="ch-${hid}"></canvas>`;
      // Detail table
      let pts=[];
      info.entries.forEach(e=>{for(let s=0;s<e.sets;s++){const k=gk(p,e.day,e.sec,e.idx,s);
        if(H[k])H[k].forEach((r,ri)=>{pts.push({...r,key:k,ri,set:s+1,day:e.day})})}});
      pts.sort((a,b)=>new Date(b.date)-new Date(a.date));
      if(pts.length){
        h+=`<table class="hist-table"><thead><tr><th>Date</th><th>Jour</th><th>Série</th><th>kg</th><th>Reps</th><th></th></tr></thead><tbody>`;
        pts.slice(0,30).forEach(pt=>{
          h+=`<tr><td>${dl(pt.date)}</td><td>${pt.day}</td><td>S${pt.set}</td><td>${pt.kg||"–"}</td><td>${pt.reps||"–"}</td>
            <td><button class="del-b" onclick="deleteEntry('${pt.key}',${pt.ri})">✕</button></td></tr>`;
        });
        h+=`</tbody></table>`;
        if(pts.length>30)h+=`<div style="text-align:center;font-size:10px;color:var(--dim);padding:8px 0">… et ${pts.length-30} de plus</div>`;
      }
      h+=`</div>`;
    }
    h+=`</div>`;
  });

  h+=`<div class="reset-area"><button class="reset-b" onclick="clearAll()">Réinitialiser l'historique</button></div>`;
  document.getElementById("hc").innerHTML=h;

  // Draw charts
  exMap.forEach((info,name)=>{
    const hid=name.replace(/[^a-zA-Z0-9]/g,"");
    if(!S.hexp[hid])return;
    const cv=document.getElementById(`ch-${hid}`);if(!cv)return;
    let pts=[];
    info.entries.forEach(e=>{for(let s=0;s<e.sets;s++){const k=gk(p,e.day,e.sec,e.idx,s);
      if(H[k])H[k].forEach(r=>{if(r.kg)pts.push({date:new Date(r.date),kg:parseFloat(r.kg),reps:parseInt(r.reps)||0})})}});
    pts.sort((a,b)=>a.date-b.date);
    if(!pts.length){cv.parentElement.insertAdjacentHTML("afterbegin",`<div class="hist-no">Pas encore de données</div>`);cv.style.display="none";return}

    const sess=[];let ld="";
    pts.forEach(pt=>{const d=pt.date.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit"});
      if(d!==ld){sess.push({label:d,maxKg:pt.kg,maxReps:pt.reps});ld=d}
      else{const c=sess[sess.length-1];if(pt.kg>c.maxKg){c.maxKg=pt.kg;c.maxReps=pt.reps}
        else if(pt.kg===c.maxKg&&pt.reps>c.maxReps)c.maxReps=pt.reps}});

    const ac=p==="him"?"#22d3ee":"#f472b6",abg=p==="him"?"#22d3ee20":"#f472b620";
    charts[hid]=new Chart(cv,{type:"line",
      data:{labels:sess.map(s=>s.label),datasets:[{label:"kg",data:sess.map(s=>s.maxKg),
        borderColor:ac,backgroundColor:abg,fill:true,tension:.3,pointRadius:4,
        pointBackgroundColor:ac,pointBorderColor:"#0c0c0e",pointBorderWidth:2,borderWidth:2.5}]},
      options:{responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},
        plugins:{legend:{display:false},tooltip:{backgroundColor:"#1a1a20",borderColor:"#232329",borderWidth:1,
          titleFont:{family:"Outfit",size:12},bodyFont:{family:"Space Mono",size:12},
          callbacks:{label:ctx=>`${ctx.raw} kg · ${sess[ctx.dataIndex].maxReps} reps`}}},
        scales:{x:{grid:{color:"#ffffff08"},ticks:{color:"#6b6b78",font:{family:"Outfit",size:10}},border:{color:"#232329"}},
          y:{grid:{color:"#ffffff08"},ticks:{color:"#6b6b78",font:{family:"Space Mono",size:10}},border:{color:"#232329"},
            title:{display:true,text:"kg",color:"#6b6b78",font:{family:"Outfit",size:10}}}}}});
  });
}

// INIT
ld();renderS();
if("serviceWorker"in navigator)navigator.serviceWorker.register("./sw.js").catch(()=>{});
</script>
